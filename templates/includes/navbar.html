<header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-6">
    <button class="md:hidden text-gray-500 hover:text-gray-700 focus:outline-none">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
    </button>
    
    <div class="flex items-center space-x-4">
        <span class="text-sm text-gray-500">
            {% if request.user.is_authenticated %}
                {{ request.user.username }} ({{ request.user.role }})
                <a href="{% url 'logout' %}" class="ml-4 text-red-600 hover:text-red-800 text-xs font-semibold uppercase">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="text-indigo-600 hover:text-indigo-800">Login</a>
            {% endif %}
        </span>
        <!-- Logout Placeholder -->
    </div>
</header>
