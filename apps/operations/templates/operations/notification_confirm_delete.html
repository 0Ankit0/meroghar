{% extends "base.html" %}

{% block title %}Delete Notification{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6">
        <h1 class="text-xl font-bold text-gray-900 mb-4">Delete Notification</h1>
        <p class="text-gray-600 mb-6">
            Are you sure you want to delete this notification?
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="flex items-center justify-end space-x-4">
                <a href="{% url 'operations:notification_detail' object.id %}" class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-950 focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 border border-gray-200 bg-white hover:bg-gray-100 hover:text-gray-900 h-10 px-4 py-2">
                    Cancel
                </a>
                <button type="submit" class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-red-500 focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-red-600 text-white hover:bg-red-700 h-10 px-4 py-2">
                    Delete
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
