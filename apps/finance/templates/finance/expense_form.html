{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto">
        <form method="post" enctype="multipart/form-data" class="space-y-8 divide-y divide-gray-200">
            {% csrf_token %}
            <div class="space-y-8 divide-y divide-gray-200">
                <div>
                     <h3 class="text-lg leading-6 font-medium text-gray-900">
                        {% if object %}Edit Expense{% else %}Log Expense{% endif %}
                    </h3>
                    
                    <div class="mt-6 grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
                        <div class="sm:col-span-3">
                            <label class="block text-sm font-medium text-gray-700">Category</label>
                            <div class="mt-1">{{ form.category }}</div>
                        </div>

                        <div class="sm:col-span-3">
                            <label class="block text-sm font-medium text-gray-700">Amount</label>
                            <div class="mt-1">{{ form.amount }}</div>
                        </div>

                        <div class="sm:col-span-3">
                            <label class="block text-sm font-medium text-gray-700">Date</label>
                            <div class="mt-1">{{ form.expense_date }}</div>
                        </div>
                        
                        <div class="sm:col-span-3">
                            <label class="block text-sm font-medium text-gray-700">Property</label>
                            <div class="mt-1">{{ form.property }}</div>
                        </div>

                        <div class="sm:col-span-3">
                            <label class="block text-sm font-medium text-gray-700">Work Order (Optional)</label>
                            <div class="mt-1">{{ form.work_order }}</div>
                        </div>
                        
                        <div class="sm:col-span-3">
                            <label class="block text-sm font-medium text-gray-700">Receipt</label>
                             <div class="mt-1">{{ form.receipt }}</div>
                        </div>

                        <div class="sm:col-span-6">
                            <label class="block text-sm font-medium text-gray-700">Description</label>
                            <div class="mt-1">{{ form.description }}</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-5">
                <div class="flex justify-end">
                    <a href="{% url 'finance:expense_list' %}" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50">Cancel</a>
                    <button type="submit" class="ml-3 inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-primary hover:bg-primary/90">Save</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
