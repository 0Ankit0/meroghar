{% extends "administration/base_auth.html" %}
{% load i18n %}

{% block title %}{% trans 'Password Reset' %}{% endblock %}

{% block content %}
<div class="w-full max-w-[400px] mx-auto">
  <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 sm:p-8">
    <div class="flex flex-col space-y-1.5 text-center mb-6">
      <h1 class="text-2xl font-semibold tracking-tight text-gray-900">
        {% trans 'Password Reset' %}
      </h1>
      <p class="text-sm text-gray-500">
        Enter your email address to reset your password.
      </p>
    </div>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      
      <div class="space-y-2">
        <label for="id_email" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">
          {% trans 'Email address' %}
        </label>
        <input type="email" name="email" id="id_email" required 
            class="flex h-10 w-full rounded-md border border-gray-200 bg-white px-3 py-2 text-sm placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-950 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 transition-all duration-200"
            placeholder="name@example.com">
      </div>

      <button type="submit" class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-950 focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-gray-900 text-gray-50 hover:bg-gray-900/90 h-10 px-4 py-2 w-full mt-2">
        {% trans 'Reset my password' %}
      </button>

      <div class="text-center text-sm">
        <a href="{% url 'login' %}" class="font-medium text-gray-900 hover:underline hover:text-gray-700">
          Back to login
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
