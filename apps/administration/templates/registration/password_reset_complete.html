{% extends "administration/base_auth.html" %}
{% load i18n %}

{% block title %}{% trans 'Password Reset Complete' %}{% endblock %}

{% block content %}
<div class="w-full max-w-[400px] mx-auto">
  <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 sm:p-8 text-center">
    <div class="flex flex-col space-y-1.5 mb-6">
      <h1 class="text-2xl font-semibold tracking-tight text-gray-900">
        {% trans 'Password reset complete' %}
      </h1>
      <p class="text-sm text-gray-500">
        Your password has been set. You may go ahead and log in now.
      </p>
    </div>

    <a href="{% url 'login' %}" class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-950 focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-gray-900 text-gray-50 hover:bg-gray-900/90 h-10 px-4 py-2 w-full">
        {% trans 'Log in' %}
    </a>
  </div>
</div>
{% endblock %}
