{% extends "base.html" %}

{% block title %}Delete Unit{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow rounded-lg overflow-hidden">
    <div class="p-6">
        <div class="flex items-center justify-center w-12 h-12 mx-auto bg-red-100 rounded-full mb-4">
            <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
        </div>
        <h3 class="text-lg font-medium text-center text-gray-900 mb-2">Delete Unit</h3>
        <p class="text-center text-gray-500 mb-6">Are you sure you want to delete unit <strong>{{ unit.unit_number }}</strong>? This action cannot be undone and may delete related lease data.</p>
        
        <form method="post" class="flex justify-center space-x-4">
            {% csrf_token %}
            <a href="{% url 'housing:unit_detail' unit.id %}" class="px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                Cancel
            </a>
            <button type="submit" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                Delete Unit
            </button>
        </form>
    </div>
</div>
{% endblock %}
