{% extends "base.html" %}

{% block title %}Delete Lease{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white shadow rounded-lg p-6">
        <h1 class="text-xl font-bold text-red-600 mb-4">Confirm Deletion</h1>
        <p class="text-gray-700 mb-6">
            Are you sure you want to delete the lease for <strong>{{ object.tenant.full_name }}</strong> - <strong>{{ object.unit }}</strong>? This action cannot be undone.
        </p>
        
        <form method="post">
            {% csrf_token %}
            <div class="flex justify-end space-x-4">
                <a href="{% url 'housing:lease_list' %}" class="px-4 py-2 border border-gray-300 rounded text-gray-700 hover:bg-gray-50">Cancel</a>
                <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                    Confirm Delete
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
