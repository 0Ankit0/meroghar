{% extends "base.html" %}

{% block title %}Delete Group{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow rounded-lg p-6">
    <h3 class="text-lg font-medium text-gray-900 mb-4">Delete Group?</h3>
    <p class="text-sm text-gray-500 mb-6">
        Are you sure you want to delete the group <strong>"{{ object.name }}"</strong>? This action cannot be undone.
    </p>
    
    <form method="post">
        {% csrf_token %}
        <div class="flex justify-end space-x-3">
            <a href="{% url 'iam:group_list' %}" class="px-4 py-2 border border-gray-300 rounded text-gray-700 hover:bg-gray-50">Cancel</a>
            <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">Delete</button>
        </div>
    </form>
</div>
{% endblock %}
