{% extends "base.html" %}

{% block title %}Occupancy Report | MeroGhar{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
                     <p class="text-2xl font-bold text-success mt-1">{{ occupancy.occupied }}</p>
                 </div>
                 <div>
                     <h3 class="text-xs font-semibold uppercase text-muted-foreground">Vacant</h3>
                     <p class="text-2xl font-bold text-destructive mt-1">{{ occupancy.vacant }}</p>
                 </div>
             </div>
        </div>
    </div>
</div>
{% endblock %}
