openapi: 3.0.3
info:
  title: Meroghar Reports API
  description: Financial and tax report generation
  version: 1.0.0

servers:
  - url: https://api.meroghar.com/api/v1
  - url: http://localhost:8000/api/v1

paths:
  /reports/generate:
    post:
      summary: Generate report
      description: Generate financial, tax, or custom report
      operationId: generateReport
      tags:
        - Reports
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - report_type
                - date_from
                - date_to
              properties:
                report_type:
                  type: string
                  enum: [financial_summary, tax_statement, payment_history, expense_report, occupancy_report, custom]
                property_id:
                  type: string
                  format: uuid
                  description: Required for property-specific reports
                date_from:
                  type: string
                  format: date
                date_to:
                  type: string
                  format: date
                output_format:
                  type: string
                  enum: [pdf, excel, csv]
                  default: pdf
                include_charts:
                  type: boolean
                  default: true
                  description: Include visualizations (PDF only)
      responses:
        '202':
          description: Report generation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: processing
                  estimated_completion:
                    type: string
                    format: date-time

  /reports/status/{job_id}:
    get:
      summary: Check report generation status
      operationId: getReportStatus
      tags:
        - Reports
      security:
        - BearerAuth: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [processing, completed, failed]
                  download_url:
                    type: string
                    description: Available when status is completed
                  error:
                    type: string
                    description: Error message if failed

  /reports/templates:
    get:
      summary: List report templates
      operationId: listReportTemplates
      tags:
        - Reports
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReportTemplate'

    post:
      summary: Create report template
      description: Save report configuration for reuse
      operationId: createReportTemplate
      tags:
        - Reports
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - report_type
                - configuration
              properties:
                name:
                  type: string
                property_id:
                  type: string
                  format: uuid
                report_type:
                  type: string
                  enum: [financial_summary, tax_statement, payment_history, expense_report, occupancy_report, custom]
                configuration:
                  type: object
                  description: Report parameters
                schedule:
                  type: string
                  enum: [manual, daily, weekly, monthly, quarterly, annually]
                  default: manual
                output_format:
                  type: string
                  enum: [pdf, excel, csv]
                recipients:
                  type: array
                  items:
                    type: string
                    format: email
                  description: Email recipients for scheduled reports
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplate'

  /reports/templates/{template_id}:
    get:
      summary: Get report template
      operationId: getReportTemplate
      tags:
        - Reports
      security:
        - BearerAuth: []
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Template details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplate'

    delete:
      summary: Delete report template
      operationId: deleteReportTemplate
      tags:
        - Reports
      security:
        - BearerAuth: []
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Template deleted

  /reports/tax-statement:
    get:
      summary: Generate annual tax statement
      description: Quick endpoint for tax filing reports
      operationId: getTaxStatement
      tags:
        - Reports
      security:
        - BearerAuth: []
      parameters:
        - name: property_id
          in: query
          schema:
            type: string
            format: uuid
        - name: financial_year
          in: query
          required: true
          schema:
            type: integer
            example: 2025
        - name: tax_region
          in: query
          schema:
            type: string
            description: Tax jurisdiction (e.g., IN-DL for Delhi, US-CA for California)
      responses:
        '200':
          description: Tax statement PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ReportTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        property_id:
          type: string
          format: uuid
        owner_id:
          type: string
          format: uuid
        name:
          type: string
        report_type:
          type: string
        configuration:
          type: object
        schedule:
          type: string
        last_generated_at:
          type: string
          format: date-time
        next_generation_at:
          type: string
          format: date-time
        output_format:
          type: string
        recipients:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time