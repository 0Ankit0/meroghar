openapi: 3.0.3
info:
  title: Meroghar Bills API
  description: Bill management and division
  version: 1.0.0

servers:
  - url: https://api.meroghar.com/api/v1
  - url: http://localhost:8000/api/v1

paths:
  /bills:
    get:
      summary: List bills
      operationId: listBills
      tags:
        - Bills
      security:
        - BearerAuth: []
      parameters:
        - name: property_id
          in: query
          schema:
            type: string
            format: uuid
        - name: bill_type
          in: query
          schema:
            type: string
            enum: [electricity, water, gas, maintenance, internet, other]
        - name: period_from
          in: query
          schema:
            type: string
            format: date
        - name: period_to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of bills
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Bill'

    post:
      summary: Create bill
      operationId: createBill
      tags:
        - Bills
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - property_id
                - bill_type
                - total_amount
                - billing_period_start
                - billing_period_end
                - due_date
                - allocations
              properties:
                property_id:
                  type: string
                  format: uuid
                bill_type:
                  type: string
                  enum: [electricity, water, gas, maintenance, internet, other]
                total_amount:
                  type: number
                  format: decimal
                billing_period_start:
                  type: string
                  format: date
                billing_period_end:
                  type: string
                  format: date
                due_date:
                  type: string
                  format: date
                bill_number:
                  type: string
                units_consumed:
                  type: number
                rate_per_unit:
                  type: number
                notes:
                  type: string
                allocations:
                  type: array
                  items:
                    type: object
                    required:
                      - tenant_id
                      - allocation_type
                      - allocation_value
                    properties:
                      tenant_id:
                        type: string
                        format: uuid
                      allocation_type:
                        type: string
                        enum: [percentage, fixed_amount]
                      allocation_value:
                        type: number
                        format: decimal
      responses:
        '201':
          description: Bill created with allocations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillWithAllocations'

  /bills/{bill_id}:
    get:
      summary: Get bill details
      operationId: getBill
      tags:
        - Bills
      security:
        - BearerAuth: []
      parameters:
        - name: bill_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Bill details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillWithAllocations'

    patch:
      summary: Update bill
      operationId: updateBill
      tags:
        - Bills
      security:
        - BearerAuth: []
      parameters:
        - name: bill_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                total_amount:
                  type: number
                  format: decimal
                due_date:
                  type: string
                  format: date
                notes:
                  type: string
      responses:
        '200':
          description: Bill updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'

  /bills/{bill_id}/allocations/{allocation_id}/pay:
    post:
      summary: Record bill payment
      description: Mark tenant's bill share as paid
      operationId: payBillAllocation
      tags:
        - Bills
      security:
        - BearerAuth: []
      parameters:
        - name: bill_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: allocation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount_paid
                - payment_method
              properties:
                amount_paid:
                  type: number
                  format: decimal
                payment_method:
                  type: string
                payment_date:
                  type: string
                  format: date
      responses:
        '200':
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillAllocation'

  /recurring-bills:
    get:
      summary: List recurring bills
      operationId: listRecurringBills
      tags:
        - Recurring Bills
      security:
        - BearerAuth: []
      parameters:
        - name: property_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of recurring bills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecurringBill'

    post:
      summary: Create recurring bill template
      operationId: createRecurringBill
      tags:
        - Recurring Bills
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - property_id
                - bill_type
                - name
                - generation_day
                - due_days_after
                - allocation_rules
              properties:
                property_id:
                  type: string
                  format: uuid
                bill_type:
                  type: string
                name:
                  type: string
                expected_amount:
                  type: number
                  format: decimal
                generation_day:
                  type: integer
                  minimum: 1
                  maximum: 28
                due_days_after:
                  type: integer
                  minimum: 0
                allocation_rules:
                  type: array
                  items:
                    type: object
                    properties:
                      tenant_id:
                        type: string
                        format: uuid
                      type:
                        type: string
                        enum: [percentage, fixed_amount]
                      value:
                        type: number
      responses:
        '201':
          description: Recurring bill created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringBill'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Bill:
      type: object
      properties:
        id:
          type: string
          format: uuid
        property_id:
          type: string
          format: uuid
        bill_type:
          type: string
        total_amount:
          type: number
          format: decimal
        currency:
          type: string
        billing_period_start:
          type: string
          format: date
        billing_period_end:
          type: string
          format: date
        due_date:
          type: string
          format: date
        bill_number:
          type: string
        units_consumed:
          type: number
        rate_per_unit:
          type: number
        notes:
          type: string
        created_at:
          type: string
          format: date-time

    BillAllocation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bill_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        allocation_type:
          type: string
        allocation_value:
          type: number
        allocated_amount:
          type: number
          format: decimal
        paid_amount:
          type: number
          format: decimal
        status:
          type: string
          enum: [pending, partially_paid, paid]

    BillWithAllocations:
      allOf:
        - $ref: '#/components/schemas/Bill'
        - type: object
          properties:
            allocations:
              type: array
              items:
                $ref: '#/components/schemas/BillAllocation'

    RecurringBill:
      type: object
      properties:
        id:
          type: string
          format: uuid
        property_id:
          type: string
          format: uuid
        bill_type:
          type: string
        name:
          type: string
        expected_amount:
          type: number
        generation_day:
          type: integer
        due_days_after:
          type: integer
        allocation_rules:
          type: object
        is_active:
          type: boolean
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date