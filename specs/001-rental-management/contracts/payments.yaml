openapi: 3.0.3
info:
  title: Meroghar Payments API
  description: Payment tracking and online payment processing
  version: 1.0.0

servers:
  - url: https://api.meroghar.com/api/v1
  - url: http://localhost:8000/api/v1

paths:
  /payments:
    get:
      summary: List payments
      operationId: listPayments
      tags:
        - Payments
      security:
        - BearerAuth: []
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
            format: uuid
        - name: property_id
          in: query
          schema:
            type: string
            format: uuid
        - name: payment_type
          in: query
          schema:
            type: string
            enum: [rent, security_deposit, bill_share, penalty, other]
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: List of payments
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'
                  total:
                    type: integer

    post:
      summary: Record payment
      description: Record offline payment (cash, bank transfer)
      operationId: recordPayment
      tags:
        - Payments
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tenant_id
                - amount
                - payment_method
                - payment_type
                - payment_date
              properties:
                tenant_id:
                  type: string
                  format: uuid
                amount:
                  type: number
                  format: decimal
                payment_method:
                  type: string
                  enum: [cash, bank_transfer, upi, other]
                payment_type:
                  type: string
                  enum: [rent, security_deposit, bill_share, penalty, other]
                payment_date:
                  type: string
                  format: date
                reference_number:
                  type: string
                notes:
                  type: string
      responses:
        '201':
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /payments/{payment_id}:
    get:
      summary: Get payment details
      operationId: getPayment
      tags:
        - Payments
      security:
        - BearerAuth: []
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /payments/{payment_id}/void:
    post:
      summary: Void payment
      description: Mark payment as void (soft delete for financial records)
      operationId: voidPayment
      tags:
        - Payments
      security:
        - BearerAuth: []
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - void_reason
              properties:
                void_reason:
                  type: string
                  minLength: 10
      responses:
        '200':
          description: Payment voided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /payments/{payment_id}/receipt:
    get:
      summary: Generate payment receipt
      description: Generate PDF receipt for payment
      operationId: generateReceipt
      tags:
        - Payments
      security:
        - BearerAuth: []
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Receipt PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /payments/online/create-intent:
    post:
      summary: Create payment intent
      description: Initialize online payment (Stripe/Razorpay/PayPal)
      operationId: createPaymentIntent
      tags:
        - Payments
        - Online Payment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tenant_id
                - amount
                - payment_type
                - gateway
              properties:
                tenant_id:
                  type: string
                  format: uuid
                amount:
                  type: number
                  format: decimal
                payment_type:
                  type: string
                  enum: [rent, security_deposit, bill_share]
                gateway:
                  type: string
                  enum: [stripe, razorpay, paypal]
      responses:
        '201':
          description: Payment intent created
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_intent_id:
                    type: string
                  client_secret:
                    type: string
                  gateway:
                    type: string
                  amount:
                    type: number
                  currency:
                    type: string

  /payments/online/webhook:
    post:
      summary: Payment gateway webhook
      description: Handle webhook from payment gateway (internal use)
      operationId: handleWebhook
      tags:
        - Online Payment
      parameters:
        - name: X-Webhook-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook processed
        '400':
          description: Invalid signature

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        property_id:
          type: string
          format: uuid
        amount:
          type: number
          format: decimal
        currency:
          type: string
        payment_method:
          type: string
        payment_type:
          type: string
        payment_date:
          type: string
          format: date
        reference_number:
          type: string
        notes:
          type: string
        receipt_url:
          type: string
        is_voided:
          type: boolean
        void_reason:
          type: string
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid