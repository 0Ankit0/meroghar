openapi: 3.0.3
info:
  title: Meroghar Tenants API
  description: Tenant management endpoints
  version: 1.0.0

servers:
  - url: https://api.meroghar.com/api/v1
  - url: http://localhost:8000/api/v1

paths:
  /tenants:
    get:
      summary: List tenants
      description: Get list of tenants with filtering and pagination
      operationId: listTenants
      tags:
        - Tenants
      security:
        - BearerAuth: []
      parameters:
        - name: property_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, pending_move_out]
        - name: search
          in: query
          schema:
            type: string
          description: Search by name, email, or phone
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: List of tenants
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tenant'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
    post:
      summary: Create tenant
      description: Create new tenant account (Owner/Intermediary only)
      operationId: createTenant
      tags:
        - Tenants
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - full_name
                - email
                - property_id
                - move_in_date
                - monthly_rent
              properties:
                full_name:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                property_id:
                  type: string
                  format: uuid
                move_in_date:
                  type: string
                  format: date
                monthly_rent:
                  type: number
                  format: decimal
                security_deposit:
                  type: number
                  format: decimal
                electricity_rate:
                  type: number
                  format: decimal
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'

  /tenants/{tenant_id}:
    get:
      summary: Get tenant details
      operationId: getTenant
      tags:
        - Tenants
      security:
        - BearerAuth: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDetail'
    patch:
      summary: Update tenant
      operationId: updateTenant
      tags:
        - Tenants
      security:
        - BearerAuth: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                monthly_rent:
                  type: number
                  format: decimal
                electricity_rate:
                  type: number
                  format: decimal
                status:
                  type: string
                  enum: [active, pending_move_out, inactive]
                move_out_date:
                  type: string
                  format: date
      responses:
        '200':
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'

  /tenants/{tenant_id}/balance:
    get:
      summary: Get tenant balance
      description: Calculate current balance (payments - expected rent - bills)
      operationId: getTenantBalance
      tags:
        - Tenants
      security:
        - BearerAuth: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Balance calculated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_id:
                    type: string
                    format: uuid
                  total_paid:
                    type: number
                    format: decimal
                  expected_rent:
                    type: number
                    format: decimal
                  bill_allocations:
                    type: number
                    format: decimal
                  current_balance:
                    type: number
                    format: decimal
                  currency:
                    type: string

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        property_id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
        phone:
          type: string
        move_in_date:
          type: string
          format: date
        move_out_date:
          type: string
          format: date
          nullable: true
        monthly_rent:
          type: number
          format: decimal
        status:
          type: string
          enum: [active, inactive, pending_move_out]
        created_at:
          type: string
          format: date-time

    TenantDetail:
      allOf:
        - $ref: '#/components/schemas/Tenant'
        - type: object
          properties:
            days_stayed:
              type: integer
            current_balance:
              type: number
              format: decimal
            payment_history:
              type: array
              items:
                type: object
            bill_allocations:
              type: array
              items:
                type: object