openapi: 3.0.3
info:
  title: Meroghar Sync API
  description: Data synchronization for offline-first mobile app
  version: 1.0.0

servers:
  - url: https://api.meroghar.com/api/v1
  - url: http://localhost:8000/api/v1

paths:
  /sync/push:
    post:
      summary: Push local changes to server
      description: Upload offline changes from mobile device
      operationId: pushChanges
      tags:
        - Sync
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - device_id
                - changes
              properties:
                device_id:
                  type: string
                  description: Unique device identifier
                last_sync_timestamp:
                  type: string
                  format: date-time
                  description: Last successful sync time
                changes:
                  type: array
                  items:
                    type: object
                    required:
                      - entity_type
                      - entity_id
                      - operation
                      - data
                      - local_timestamp
                    properties:
                      entity_type:
                        type: string
                        enum: [payment, tenant, bill, bill_allocation, expense, message]
                      entity_id:
                        type: string
                        format: uuid
                      operation:
                        type: string
                        enum: [create, update, delete]
                      data:
                        type: object
                        description: Entity data
                      local_timestamp:
                        type: string
                        format: date-time
      responses:
        '200':
          description: Changes processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed:
                    type: integer
                  conflicts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Conflict'
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        entity_id:
                          type: string
                        error:
                          type: string

  /sync/pull:
    get:
      summary: Pull server changes to device
      description: Download updates from server since last sync
      operationId: pullChanges
      tags:
        - Sync
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: query
          required: true
          schema:
            type: string
        - name: last_sync_timestamp
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: entities
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [tenants, payments, bills, bill_allocations, expenses, messages, documents, notifications]
          description: Specific entities to sync (default: all)
      responses:
        '200':
          description: Server changes
          content:
            application/json:
              schema:
                type: object
                properties:
                  sync_timestamp:
                    type: string
                    format: date-time
                  changes:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: object
                  deleted_ids:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string

  /sync/conflicts:
    get:
      summary: List unresolved conflicts
      operationId: listConflicts
      tags:
        - Sync
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of conflicts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conflict'

  /sync/conflicts/{conflict_id}/resolve:
    post:
      summary: Resolve sync conflict
      description: Manually resolve conflict for financial transactions
      operationId: resolveConflict
      tags:
        - Sync
      security:
        - BearerAuth: []
      parameters:
        - name: conflict_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resolution
              properties:
                resolution:
                  type: string
                  enum: [accept_local, accept_server, merge_both, custom]
                merged_data:
                  type: object
                  description: Required if resolution is 'merge_both' or 'custom'
      responses:
        '200':
          description: Conflict resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  conflict_id:
                    type: string
                    format: uuid
                  resolution:
                    type: string
                  resolved_at:
                    type: string
                    format: date-time

  /sync/status:
    get:
      summary: Get sync status
      description: Check device sync health and pending changes
      operationId: getSyncStatus
      tags:
        - Sync
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sync status
          content:
            application/json:
              schema:
                type: object
                properties:
                  device_id:
                    type: string
                  last_sync_at:
                    type: string
                    format: date-time
                  pending_conflicts:
                    type: integer
                  sync_health:
                    type: string
                    enum: [healthy, delayed, error]
                  next_sync_recommended_at:
                    type: string
                    format: date-time

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Conflict:
      type: object
      properties:
        id:
          type: string
          format: uuid
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        conflict_type:
          type: string
          enum: [financial_transaction, profile_data]
        local_version:
          type: object
          properties:
            data:
              type: object
            timestamp:
              type: string
              format: date-time
            device_id:
              type: string
        server_version:
          type: object
          properties:
            data:
              type: object
            timestamp:
              type: string
              format: date-time
            device_id:
              type: string
        detected_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
        resolution:
          type: string