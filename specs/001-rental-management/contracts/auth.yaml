openapi: 3.0.3
info:
  title: Meroghar Authentication API
  description: Authentication and authorization endpoints for Meroghar Rental Management System
  version: 1.0.0
  contact:
    name: Meroghar API Support
    email: api@meroghar.com

servers:
  - url: https://api.meroghar.com/api/v1
    description: Production server
  - url: https://staging-api.meroghar.com/api/v1
    description: Staging server
  - url: http://localhost:8000/api/v1
    description: Local development server

paths:
  /auth/register:
    post:
      summary: Register new user account
      description: Create a new user account (Owner or Intermediary). Tenants are created by Owners/Intermediaries.
      operationId: registerUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - full_name
                - role
              properties:
                email:
                  type: string
                  format: email
                  example: "owner@example.com"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "SecureP@ss123"
                  description: Minimum 8 characters
                full_name:
                  type: string
                  minLength: 2
                  maxLength: 255
                  example: "John Doe"
                phone:
                  type: string
                  pattern: '^\+?[1-9]\d{1,14}$'
                  example: "+919876543210"
                  description: E.164 format phone number
                role:
                  type: string
                  enum: [owner, intermediary]
                  example: "owner"
                  description: User role (tenants created separately)
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  access_token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    description: JWT access token (15 min expiry)
                  refresh_token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    description: JWT refresh token (7 day expiry)
                  token_type:
                    type: string
                    example: "Bearer"
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "email_already_exists"
                message: "An account with this email already exists"
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      summary: User login
      description: Authenticate user and receive access + refresh tokens
      operationId: loginUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "owner@example.com"
                password:
                  type: string
                  format: password
                  example: "SecureP@ss123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  token_type:
                    type: string
                    example: "Bearer"
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "invalid_credentials"
                message: "Email or password is incorrect"
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      summary: Refresh access token
      description: Obtain new access token using valid refresh token
      operationId: refreshToken
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  description: Valid refresh token
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: New access token
                  refresh_token:
                    type: string
                    description: New refresh token (old one invalidated)
                  token_type:
                    type: string
                    example: "Bearer"
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "invalid_refresh_token"
                message: "Refresh token is invalid or has been revoked"

  /auth/logout:
    post:
      summary: User logout
      description: Invalidate refresh token (access token expires naturally)
      operationId: logoutUser
      tags:
        - Authentication
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Logout successful (no content)
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/change-password:
    post:
      summary: Change user password
      description: Change authenticated user's password
      operationId: changePassword
      tags:
        - Authentication
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - current_password
                - new_password
              properties:
                current_password:
                  type: string
                  format: password
                new_password:
                  type: string
                  format: password
                  minLength: 8
                  description: New password (min 8 characters)
      responses:
        '204':
          description: Password changed successfully
        '400':
          description: Current password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "incorrect_password"
                message: "Current password is incorrect"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/forgot-password:
    post:
      summary: Request password reset
      description: Send password reset link to user's email
      operationId: forgotPassword
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '204':
          description: Reset link sent if email exists (security: no confirmation)
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "rate_limit_exceeded"
                message: "Too many password reset requests. Try again in 15 minutes."

  /auth/reset-password:
    post:
      summary: Reset password with token
      description: Reset password using token from email link
      operationId: resetPassword
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - new_password
              properties:
                token:
                  type: string
                  description: Password reset token from email
                new_password:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '204':
          description: Password reset successfully
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "invalid_reset_token"
                message: "Password reset token is invalid or has expired"
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/verify-token:
    get:
      summary: Verify access token validity
      description: Check if current access token is valid
      operationId: verifyToken
      tags:
        - Authentication
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true
                  user:
                    $ref: '#/components/schemas/User'
                  expires_at:
                    type: string
                    format: date-time
                    example: "2025-10-26T15:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token in Authorization header

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        email:
          type: string
          format: email
          example: "user@example.com"
        full_name:
          type: string
          example: "John Doe"
        phone:
          type: string
          nullable: true
          example: "+919876543210"
        role:
          type: string
          enum: [owner, intermediary, tenant]
          example: "owner"
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2025-01-15T10:30:00Z"
        last_login_at:
          type: string
          format: date-time
          nullable: true
          example: "2025-10-26T08:45:00Z"

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Machine-readable error code
          example: "validation_error"
        message:
          type: string
          description: Human-readable error message
          example: "Invalid input data"
        details:
          type: object
          description: Additional error context
          additionalProperties: true

    ValidationError:
      type: object
      required:
        - error
        - message
        - details
      properties:
        error:
          type: string
          example: "validation_error"
        message:
          type: string
          example: "Input validation failed"
        details:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email: ["Invalid email format"]
            password: ["Password must be at least 8 characters"]

  responses:
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "bad_request"
            message: "The request could not be understood"

    Unauthorized:
      description: Unauthorized - invalid or missing authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "unauthorized"
            message: "Authentication required. Please provide valid access token."

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "forbidden"
            message: "You do not have permission to access this resource"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "not_found"
            message: "The requested resource was not found"

    ValidationError:
      description: Validation error - invalid input data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "internal_server_error"
            message: "An unexpected error occurred. Please try again later."

security:
  - BearerAuth: []